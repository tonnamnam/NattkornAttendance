services:
  - type: web
    name: nattakorn-attendance-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nattakorn-attendance-db
          property: connectionString
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: ADMIN_API_KEY
        sync: false

databases:
  - name: nattakorn-attendance-db
    databaseName: nattakorn_attendance
    user: nattakorn_attendance
